name: Publish NuGet Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-publish:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # necesario para que GitHub emita el token OIDC que valida NuGet.org (Trusted Publishing)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Nerdbank.GitVersioning necesita el historial completo (no un shallow clone)
          # para calcular la altura del commit y por tanto la versión.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore SergioIzq.DotnetKernel.sln

      - name: Build
        run: dotnet build SergioIzq.DotnetKernel.sln --configuration Release --no-restore

      - name: Pack
        run: dotnet pack SergioIzq.DotnetKernel.sln --configuration Release --no-build -o ./artifacts

      - name: NuGet login (OIDC → API key temporal)
        uses: NuGet/login@v1
        id: login
        with:
          user: sergioizq

      - name: Push to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Summary
        run: |
          echo "✅ Paquetes publicados en NuGet.org"
          ls -la ./artifacts
